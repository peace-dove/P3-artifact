# Generated by: neo4j-admin server memory-recommendation
# Machine: 247.8GiB RAM, ~1200MB data + native indexes, no Lucene indexes

# === Memory Settings ===
# Heap capped at 31g to keep compressed oops enabled
server.memory.heap.initial_size=31g
server.memory.heap.max_size=31g
server.memory.pagecache.size=197g

# Crash on OOM instead of running partially broken
server.jvm.additional=-XX:+ExitOnOutOfMemoryError

# === Transaction & Logging ===
dbms.tx_log.rotation.retention_policy=1 files
dbms.tx_state.memory_allocation=ON_HEAP

# === Network & Connectors ===
server.bolt.thread_pool_min_size=50
server.bolt.thread_pool_max_size=400
server.default_listen_address=0.0.0.0

# === Plugins & Security ===
server.directories.plugins=/plugins
server.directories.logs=/logs
dbms.security.procedures.unrestricted=apoc.*
dbms.security.auth_enabled=false
